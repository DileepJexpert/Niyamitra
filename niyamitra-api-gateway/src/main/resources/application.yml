server:
  port: 8090

spring:
  application:
    name: niyamitra-api-gateway

  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:3001"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

      routes:
        # Niyamitra Profile Service
        - id: niyamitra-profile-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/tenants/**

        # Anupalan Rule Engine
        - id: anupalan-rule-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/anupalan/rules/**

        # Niyamitra Document Vault
        - id: niyamitra-document-vault
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/documents/**

        # Niyamitra Task Service
        - id: niyamitra-task-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/tasks/**, /api/v1/anupalan/dashboard/**, /api/v1/anupalan/score/**

        # Kavach Notification Service
        - id: kavach-notification-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/kavach/notifications/**

        # Kavach WhatsApp Webhook
        - id: kavach-whatsapp-webhook
          uri: http://localhost:8086
          predicates:
            - Path=/api/v1/kavach/**

      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 100
            redis-rate-limiter.burstCapacity: 200

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    gateway:
      enabled: true

logging:
  level:
    com.niyamitra: DEBUG
    org.springframework.cloud.gateway: DEBUG
