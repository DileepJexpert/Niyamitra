server:
  port: 8083

spring:
  application:
    name: niyamitra-document-vault

  datasource:
    url: jdbc:postgresql://localhost:5432/niyamitra?currentSchema=niyamitra_documents
    username: niyamitra
    password: niyamitra_dev
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: niyamitra_documents
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    enabled: true
    schemas: niyamitra_documents
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

minio:
  endpoint: http://localhost:9000
  access-key: niyamitra
  secret-key: niyamitra_dev
  bucket-name: niyamitra-documents

logging:
  level:
    com.niyamitra: DEBUG
