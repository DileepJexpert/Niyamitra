server:
  port: 8082

spring:
  application:
    name: anupalan-rule-service

  datasource:
    url: jdbc:postgresql://localhost:5432/niyamitra?currentSchema=anupalan_rules
    username: niyamitra
    password: niyamitra_dev
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: anupalan_rules
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    enabled: true
    schemas: anupalan_rules
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

logging:
  level:
    com.niyamitra: DEBUG
