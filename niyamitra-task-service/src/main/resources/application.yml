server:
  port: 8084

spring:
  application:
    name: niyamitra-task-service

  datasource:
    url: jdbc:postgresql://localhost:5432/niyamitra?currentSchema=niyamitra_tasks
    username: niyamitra
    password: niyamitra_dev
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: niyamitra_tasks
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    enabled: true
    schemas: niyamitra_tasks
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: niyamitra-task-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.niyamitra.*

logging:
  level:
    com.niyamitra: DEBUG
