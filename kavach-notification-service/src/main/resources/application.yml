server:
  port: 8085

spring:
  application:
    name: kavach-notification-service

  datasource:
    url: jdbc:postgresql://localhost:5432/niyamitra?currentSchema=kavach_notifications
    username: niyamitra
    password: niyamitra_dev
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: kavach_notifications
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    enabled: true
    schemas: kavach_notifications
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: kavach-notification-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.niyamitra.*
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

niyamitra:
  profile-service:
    url: http://localhost:8081

kavach:
  whatsapp:
    api-url: https://graph.facebook.com/v21.0
    phone-number-id: ${WHATSAPP_PHONE_NUMBER_ID:}
    access-token: ${WHATSAPP_ACCESS_TOKEN:}

logging:
  level:
    com.niyamitra: DEBUG
